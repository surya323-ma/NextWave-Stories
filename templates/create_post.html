{% extends "base.html" %}
{% block title %}Write a Post — Inkwell{% endblock %}
{% block content %}
<div class="auth-page">
  <div class="create-wrap">
    <div class="create-header">
      <h1>✍️ Create a New Post</h1>
      <p>Share your ideas with the Inkwell community.</p>
    </div>
    <form method="post" class="create-form">
      <div class="form-group">
        <label>Post Title *</label>
        <input type="text" name="title" placeholder="Give your post a compelling title…" required>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Category *</label>
          <select name="category" required>
            <option value="Technology">💻 Technology</option>
            <option value="Travel">✈️ Travel</option>
            <option value="Food">🍽️ Food</option>
            <option value="Lifestyle">🌿 Lifestyle</option>
            <option value="Photography">📷 Photography</option>
            <option value="Education">📚 Education</option>
          </select>
        </div>
        <div class="form-group">
          <label>Tags (comma separated)</label>
          <input type="text" name="tags" placeholder="e.g. Python, Tutorial, Backend">
        </div>
      </div>
      <div class="form-group">
        <label>Content *</label>
        <textarea name="content" rows="16"
          placeholder="Start writing your post…&#10;&#10;Use two empty lines to separate paragraphs."
          required></textarea>
        <div class="char-count" id="charCount">0 characters</div>
      </div>
      <div class="form-actions">
        <a href="{{ url_for('index') }}" class="btn-ghost">Discard</a>
        <button type="submit" class="btn-primary">🚀 Publish Post</button>
      </div>
    </form>
  </div>
</div>
<script>
const ta = document.querySelector('textarea[name="content"]');
const cc = document.getElementById('charCount');
ta.addEventListener('input', () => {
  const words = ta.value.trim().split(/\s+/).filter(Boolean).length;
  cc.textContent = `${ta.value.length} characters · ~${Math.max(1, Math.ceil(words/200))} min read`;
});
</script>
{% endblock %}
