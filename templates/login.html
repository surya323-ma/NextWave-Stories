{% extends "base.html" %}
{% block title %}Login — NextWave Stories{% endblock %}
{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-header">
      <div class="auth-logo">📰</div>
      <h2>Welcome back</h2>
      <p>Sign in to your NextWave  account</p>
    </div>
    <form method="post" class="auth-form">
      <div class="form-group">
        <label>Username</label>
        <input type="text" name="username" placeholder="Your username" required autofocus>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" placeholder="Your password" required>
      </div>
      <button type="submit" class="btn-primary full">Sign In</button>
    </form>
    <div class="auth-footer">
      Don't have an account? <a href="{{ url_for('register') }}">Sign up</a>
    </div>
  </div>
</div>
{% endblock %}
