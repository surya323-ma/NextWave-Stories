{% extends "base.html" %}
{% block title %}Sign Up — Inkwell{% endblock %}
{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-header">
      <div class="auth-logo">📰</div>
      <h2>Join Inkwell</h2>
      <p>Create your account and start writing</p>
    </div>
    <form method="post" class="auth-form">
      <div class="form-group">
        <label>Username *</label>
        <input type="text" name="username" placeholder="Choose a username" required autofocus>
      </div>
      <div class="form-group">
        <label>Email *</label>
        <input type="email" name="email" placeholder="your@email.com" required>
      </div>
      <div class="form-group">
        <label>Password *</label>
        <input type="password" name="password" placeholder="Create a password (min 6 chars)" minlength="6" required>
      </div>
      <button type="submit" class="btn-primary full">Create Account →</button>
    </form>
    <div class="auth-footer">
      Already have an account? <a href="{{ url_for('login') }}">Sign in</a>
    </div>
  </div>
</div>
{% endblock %}
